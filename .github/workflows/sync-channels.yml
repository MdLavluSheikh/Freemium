name: Sync IPTV Channels

on:
  schedule:
    # Every 6 hours — the upstream repo updates every hour
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest channels from IPTV playlist
        run: node scripts/fetch-channels.mjs

      - name: Commit updated channel data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync IPTV channel data [skip ci]"
            git push
          fi
